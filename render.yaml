services:
  - type: web
    name: secure-product-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Region gần Việt Nam
    region: singapore

    # FREE plan
    plan: free

    # Environment Variables
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 1h

      - key: LOG_LEVEL
        value: info

    # Health check
    healthCheckPath: /api/health

    # Auto deploy
    autoDeploy: true
